version: '3.8'

services:
  bot:
    build: .
    container_name: digital-akhi-bot
    restart: unless-stopped
    environment:
      - DISCORD_TOKEN=${DISCORD_TOKEN}
      - MONGODB_URI=mongodb://mongodb:27017/digital-akhi
      - REDIS_URL=redis://redis:6379
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - SUPPORT_SERVER_ID=${SUPPORT_SERVER_ID}
      - SECURITY_ALERT_CHANNEL_ID=${SECURITY_ALERT_CHANNEL_ID}
    depends_on:
      - mongodb
      - redis

  mongodb:
    image: mongo:7
    container_name: akhi-mongodb
    restart: unless-stopped
    volumes:
      - mongodb_data:/data/db

  redis:
    image: redis:7-alpine
    container_name: akhi-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data

volumes:
  mongodb_data:
  redis_data:
